# ============================================================
# render.yaml — Blueprint de despliegue en Render
# ============================================================
# Sube este archivo a la raiz del repo para deploy automatico.
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: motichat
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      # Render establece RENDER=true automaticamente
      - key: PYTHON_VERSION
        value: "3.13.0"

      # --- gRPC interno ---
      - key: GRPC_HOST
        value: localhost
      - key: GRPC_PORT
        value: "50051"

      # --- Firebase Admin SDK (JSON del service account) ---
      # Pegar el contenido COMPLETO del archivo firebase_config.json
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

      # --- Firebase Web (frontend) ---
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
